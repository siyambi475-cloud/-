<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Control Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --error: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }
        h2 { margin-bottom: 20px; font-size: 1.5rem; }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px 40px 12px 16px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #334155;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
        #message {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--error);
            display: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2><i class="fas fa-lock"></i> Enter Password</h2>
    <div class="input-group">
        <input type="password" id="passwordField" placeholder="Enter Password Here">
        <i class="fas fa-eye" id="toggleIcon" onclick="togglePassword()"></i>
    </div>
    <button onclick="validateAccess()">Verify Access</button>
    <div id="message"></div>
</div>

<script>
    // ------------------------------------------------------------
    // এখানে আপনার পাসওয়ার্ডটি বসিয়ে নিন
    // ------------------------------------------------------------
    const CONFIG = {
        password: "YOUR_PASSWORD_HERE", // এখানে আপনার পাসওয়ার্ডটি দিন
        expiryDate: "2026-07-11"         // আজ থেকে ৩ দিন পর (১১ জুলাই, ২০২৬) এটি এক্সপায়ার হয়ে যাবে
    };

    function togglePassword() {
        const passwordField = document.getElementById("passwordField");
        const toggleIcon = document.getElementById("toggleIcon");
        if (passwordField.type === "password") {
            passwordField.type = "text";
            toggleIcon.classList.remove("fa-eye");
            toggleIcon.classList.add("fa-eye-slash");
        } else {
            passwordField.type = "password";
            toggleIcon.classList.remove("fa-eye-slash");
            toggleIcon.classList.add("fa-eye");
        }
    }

    function validateAccess() {
        const inputPass = document.getElementById("passwordField").value;
        const messageDiv = document.getElementById("message");
        
        // বর্তমান লোকাল তারিখ নির্ধারণ
        const today = new Date();
        const expiry = new Date(CONFIG.expiryDate);
        
        // নিখুঁতভাবে শুধু তারিখ মেলানোর জন্য সময় শূন্য করা হলো
        today.setHours(0,0,0,0);
        expiry.setHours(0,0,0,0);

        messageDiv.style.display = "block";

        // ১. ডেট এক্সপায়ার হয়েছে কিনা চেক
        if (today > expiry) {
            messageDiv.style.color = "var(--error)";
            messageDiv.innerHTML = "<i class='fas fa-exclamation-circle'></i> This link has expired!";
            return;
        }

        // ২. পাসওয়ার্ড চেক
        if (inputPass === CONFIG.password) {
            messageDiv.style.color = "#22c55e";
            messageDiv.innerHTML = "<i class='fas fa-check-circle'></i> Success! Redirecting...";
            
            setTimeout(() => {
                window.location.href = "index.html"; 
            }, 1000);
        } else {
            messageDiv.style.color = "var(--error)";
            messageDiv.innerHTML = "<i class='fas fa-times-circle'></i> Incorrect password. Try again.";
        }
    }
</script>

</body>
</html>
